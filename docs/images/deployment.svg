<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="760" height="400" fill="#0f1115"/>
  <text x="380" y="38" fill="#e8eaed" font-size="22" font-weight="700" text-anchor="middle">两种部署形态</text>
  <text x="380" y="60" fill="#8a93a3" font-size="13" text-anchor="middle">同一份代码，跑在机器人上 或 跑在开发机上</text>

  <!-- 形态 A：跑在机器人上 -->
  <text x="200" y="98" fill="#7fe9bd" font-size="15" font-weight="700" text-anchor="middle">★ 推荐：程序跑在机器人上</text>
  <rect x="120" y="116" width="160" height="64" rx="10" fill="#10241b" stroke="#36c08a" stroke-width="1.5"/>
  <text x="200" y="143" fill="#7fe9bd" font-size="13.5" font-weight="600" text-anchor="middle">Aegis 机器人</text>
  <text x="200" y="163" fill="#9fe7c6" font-size="11.5" text-anchor="middle">你的程序 + SDK (aarch64)</text>
  <text x="200" y="206" fill="#c7ccd6" font-size="12" text-anchor="middle">本机回环控制 · 延迟最低</text>
  <text x="200" y="226" fill="#c7ccd6" font-size="12" text-anchor="middle">systemd 开机自启</text>

  <!-- 分隔 -->
  <line x1="380" y1="92" x2="380" y2="300" stroke="#2a2f3a" stroke-width="1.2" stroke-dasharray="4 5"/>

  <!-- 形态 B：跑在开发机上 -->
  <text x="560" y="98" fill="#a9d3ff" font-size="15" font-weight="700" text-anchor="middle">开发调试：程序跑在开发机</text>
  <rect x="448" y="116" width="150" height="64" rx="10" fill="#15233a" stroke="#3aa0ff" stroke-width="1.5"/>
  <text x="523" y="143" fill="#a9d3ff" font-size="13" font-weight="600" text-anchor="middle">Linux 开发机</text>
  <text x="523" y="163" fill="#a9d3ff" font-size="11.5" text-anchor="middle">你的程序 + SDK (x86_64)</text>
  <rect x="640" y="116" width="90" height="64" rx="10" fill="#10241b" stroke="#36c08a" stroke-width="1.5"/>
  <text x="685" y="150" fill="#7fe9bd" font-size="12.5" font-weight="600" text-anchor="middle">Aegis</text>
  <text x="685" y="168" fill="#9fe7c6" font-size="11" text-anchor="middle">机器人</text>
  <path d="M598 148 H640" stroke="#3aa0ff" stroke-width="1.6" fill="none"/>
  <text x="619" y="140" fill="#8a93a3" font-size="10" text-anchor="middle">热点</text>
  <text x="560" y="206" fill="#c7ccd6" font-size="12" text-anchor="middle">开发机算力随便用 · 受 WiFi 质量影响</text>
  <text x="560" y="226" fill="#c7ccd6" font-size="12" text-anchor="middle">FF_SDK_D1_HOST=&lt;robot-ip&gt;</text>

  <!-- 连接方式底栏 -->
  <rect x="120" y="266" width="520" height="0" />
  <text x="380" y="296" fill="#e8eaed" font-size="14" font-weight="600" text-anchor="middle">两种网络接入</text>
  <rect x="150" y="312" width="220" height="58" rx="8" fill="#1c2230" stroke="#5b6677" stroke-width="1.2"/>
  <text x="260" y="336" fill="#e8eaed" font-size="13" font-weight="600" text-anchor="middle">热点直连（默认）</text>
  <text x="260" y="356" fill="#8a93a3" font-size="11.5" text-anchor="middle">连机器人自带 WiFi 热点</text>
  <rect x="390" y="312" width="220" height="58" rx="8" fill="#1c2230" stroke="#5b6677" stroke-width="1.2"/>
  <text x="500" y="336" fill="#e8eaed" font-size="13" font-weight="600" text-anchor="middle">以太网 / 局域网</text>
  <text x="500" y="356" fill="#8a93a3" font-size="11.5" text-anchor="middle">FF_SDK_D1_HOST=&lt;robot-ip&gt;</text>
</svg>
