<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="760" height="470" fill="#0f1115"/>
  <text x="380" y="38" fill="#e8eaed" font-size="22" font-weight="700" text-anchor="middle">FF Aegis SDK 分层架构</text>
  <text x="380" y="60" fill="#8a93a3" font-size="13" text-anchor="middle">你只写最上面两层；底层差异 SDK 替你吸收</text>

  <!-- 你的应用 -->
  <rect x="120" y="86" width="520" height="52" rx="8" fill="#1c2230" stroke="#3aa0ff" stroke-width="1.5"/>
  <text x="380" y="111" fill="#e8eaed" font-size="16" font-weight="600" text-anchor="middle">你的应用 / 脚本</text>
  <text x="380" y="129" fill="#8a93a3" font-size="12" text-anchor="middle">Python (ff_sdk)  或  C++ (ff::aegis::Robot)</text>

  <!-- 统一 API -->
  <rect x="120" y="156" width="520" height="58" rx="8" fill="#15233a" stroke="#3aa0ff" stroke-width="1.5"/>
  <text x="380" y="180" fill="#e8eaed" font-size="15" font-weight="600" text-anchor="middle">统一能力 API</text>
  <text x="380" y="200" fill="#a9d3ff" font-size="12.5" text-anchor="middle">motion (stand · move · do_preset)   ·   state (battery · pose · joints)   ·   e_stop · diagnose</text>

  <!-- 适配层 -->
  <rect x="120" y="232" width="520" height="58" rx="8" fill="#1c2230" stroke="#5b6677" stroke-width="1.2"/>
  <text x="380" y="256" fill="#e8eaed" font-size="15" font-weight="600" text-anchor="middle">Aegis 适配层（自动选机型）</text>
  <text x="380" y="276" fill="#8a93a3" font-size="12.5" text-anchor="middle">点足 (zsl-1)  ·  轮足 (zsl-1w)  —  特技集 / 关节数差异在此吸收</text>

  <!-- 厂商运行时 -->
  <rect x="120" y="308" width="520" height="56" rx="8" fill="#181a1f" stroke="#5b6677" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="380" y="331" fill="#c7ccd6" font-size="14" font-weight="600" text-anchor="middle">底层运动运行时（已捆绑进安装包）</text>
  <text x="380" y="350" fill="#6f7888" font-size="12" text-anchor="middle">预编译二进制 · 双架构 x86_64 / aarch64 · 你无需单独安装</text>

  <!-- 机器人 -->
  <rect x="240" y="396" width="280" height="50" rx="25" fill="#10241b" stroke="#36c08a" stroke-width="1.5"/>
  <text x="380" y="426" fill="#7fe9bd" font-size="15" font-weight="600" text-anchor="middle">Aegis 四足机器人（UDP）</text>

  <!-- arrows -->
  <g stroke="#3aa0ff" stroke-width="1.6" fill="none" opacity="0.8">
    <path d="M380 138 V156"/><path d="M380 214 V232"/>
  </g>
  <g stroke="#5b6677" stroke-width="1.6" fill="none" opacity="0.8">
    <path d="M380 290 V308"/><path d="M380 364 V396"/>
  </g>
  <text x="648" y="195" fill="#3aa0ff" font-size="11" text-anchor="start">← 你的边界</text>
  <text x="648" y="270" fill="#6f7888" font-size="11" text-anchor="start">← SDK 内部</text>
</svg>
